workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Build APK
        script: |
          flutter create --project-name madam_chow --org com.dizziglitch madamchow
          cd madamchow
          cp ../lib/main.dart lib/main.dart
          cp ../pubspec.yaml pubspec.yaml
          flutter pub get
          flutter build apk --debug
    artifacts:
      - madamchow/build/**/outputs/**/*.apk